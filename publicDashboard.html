<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TemuIn - Cari Barang Hilang</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="publicDashboardStyle.css">
</head>
<body>

    <!-- Main Top Navbar -->
    <nav class="navbar navbar-expand-lg bg-topbar py-3">
        <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
            
            <!-- Logo -->
            <a class="navbar-brand text-white fw-bold fs-3" href="#">
                <div class="logo"></div>
            </a>

            <!-- Search Bar (Centered) -->
            <div class="d-none d-md-flex search-wrapper align-items-center mx-auto">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="form-control" placeholder="Cari yang hilang">
                <i class="fas fa-camera camera-icon" style="cursor: pointer;"></i>
            </div>

            <!-- Right Menu (Lang, Notification, Profile) -->
            <div class="d-flex align-items-center gap-3">
                <div class="dropdown">
                    <button class="btn btn-sm btn-dark dropdown-toggle text-white border-secondary" style="background-color: #2c3035;" type="button" data-bs-toggle="dropdown">
                        🇮🇩 ID
                    </button>
                    <ul class="dropdown-menu dropdown-menu-dark">
                        <li><a class="dropdown-item" href="#">🇬🇧 EN</a></li>
                    </ul>
                </div>
                <a href="#" class="text-temuin-green fs-5"><i class="far fa-bell"></i></a>
                <a href="#" class="text-temuin-green fs-4"><i class="fas fa-user-circle"></i></a>
            </div>
        </div>
    </nav>

    <!-- Sub Menu Navigation -->
    <div class="bg-white border-bottom shadow-sm sub-menu d-flex justify-content-center py-2">
        <a href="#" class="active">Barang Hilang</a>
        <a href="#">Barang Temuan</a>
        <a href="#">Testimoni</a>
    </div>

    <!-- Main Content Grid -->
    <div class="container-fluid px-4 py-4">
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="cardContainer">
        </div> 
    </div>

        <!-- </div>  -->
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>

    const container = document.getElementById('cardContainer');

    function renderCards(data) {
        let htmlContent = '';

        data.forEach(item => {
            const badgeClass = item.status === 'Hilang' ? 'badge-hilang' : 'bg-success';
            
            htmlContent += `
                <div class="col">
                    <div class="card custom-card shadow-sm h-100 position-relative">
                        <span class="badge rounded-pill ${badgeClass}" style="position: absolute; top: 10px; right: 10px; z-index: 1;">${item.status}</span>
                        <img src="${item.imageUrl}" class="card-img-top" alt="${item.title}">
                        
                        <div class="card-body d-flex flex-column">
                            <h6 class="card-title fw-bold mb-1">${item.title}</h6>
                            <p class="card-text text-muted mb-3" style="font-size: 0.8rem; line-height: 1.2;">
                                ${item.description}
                            </p>
                            
                            <div class="mt-auto">
                                <div class="mb-2">
                                    <div class="text-meta mb-1"><i class="fas fa-map-marker-alt text-temuin-green me-2"></i>${item.location}</div>
                                    <div class="text-meta"><i class="far fa-clock text-temuin-green me-2"></i>${item.status}: ${item.date}</div>
                                </div>
                                
                                <div class="d-flex align-items-center mb-2">
                                    <div class="user-avatar bg-secondary me-2">${item.userInitials}</div>
                                    <span class="text-meta">${item.user}</span>
                                </div>
                                
                                <div class="d-flex align-items-center mb-2">
                                    <i class="fas fa-heart text-danger me-2" style="font-size: 0.8rem;"></i>
                                    <span class="text-meta">${item.category}</span>
                                </div>
                                <h6 class="fw-bold mb-0">${item.price}</h6>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });

        container.innerHTML = htmlContent;
    }

    fetch('dataBarang.json')
        .then(response => {
            if (!response.ok) {
                throw new Error('Gagal mengambil data JSON');
            }
            return response.json(); // Mengubah response menjadi object JavaScript
        })
        .then(data => {
            renderCards(data); // Memanggil fungsi render setelah data berhasil diambil
        })
        .catch(error => {
            console.error('Ada masalah dengan fetch operation:', error);
            container.innerHTML = '<p class="text-danger text-center w-100 mt-5">Gagal memuat data.</p>';
        });
</script>
</body>
</html>
